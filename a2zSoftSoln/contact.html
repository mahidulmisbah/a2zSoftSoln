.form-container {

}

.text-center {

}

.section-title {
    color: #007bff;

    font-weight: bold;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: block;
}

h2 {
    font-size: 2.5rem;
    margin-bottom: 30px;
    font-weight: bold;
}

.text-gradient {
    background: #007bff;
    -webkit-background-clip: text;
    color: transparent;
}

.contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

.col {
    flex: 1;
    min-width: 260px;
}

.form-group {
    margin-bottom: 20px;
}

label {
    font-size: 1.75rem;
    font-weight: bold;
    margin-bottom: 10px;
    display: block;
}

.form-control {
    width: 100%;
    padding: 12px;
    background-color: #000000;
    border: 1px solid #444;
    border-radius: 8px;
    color: #fff;
    font-size: 1.75rem;
    transition: border-color 0.3s ease;
}

.form-control:focus {
    border-color: #007bff;
    outline: none;
}

textarea.form-control {
    resize: vertical;
}

.send-btn {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1px solid #00eaff;
    color: #00eaff;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.3s ease;
}

/* Hover effect */
.send-btn:hover {
    background-color: rgba(0, 234, 255, 0.1);
    box-shadow: 0 0 10px #00eaff, 0 0 20px rgba(0, 234, 255, 0.5);
}

/* Spinner */
.loader {
    border: 2px solid #fff;
    border-top: 2px solid transparent;
    border-radius: 50%;
    width: 16px;
    height: 16px;
    display: inline-block;
    animation: spin 0.6s linear infinite;
    margin-left: 8px;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}

.send-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* Icon animation */
.send-btn .icon {
    display: flex;
    transition: transform 0.3s ease;
}

.send-btn:hover .icon {
    transform: translateX(6px);
}
